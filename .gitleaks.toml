# Gitleaks configuration for AVAROS
# https://github.com/gitleaks/gitleaks

title = "AVAROS Gitleaks Config"

# Allow known false positives and doc examples
[[allowlist]]
  description = "DEVELOPMENT.md example credential (clearly marked BAD)"
  paths = ["DEVELOPMENT.md"]

[[allowlist]]
  description = "E2E test compose files use ephemeral test credentials"
  paths = [
    "docker/docker-compose.e2e.yml",
    "docker/docker-compose.e2e-voice.yml",
  ]

[[allowlist]]
  description = "Test fixtures may use explicit fake credentials"
  paths = [
    "tests/",
    "test_e2e.py",
  ]
  regexTarget = "match"
  regexes = [
    "(?i)\\btest-key\\b",
    "(?i)\\bold-cookie\\b",
    "(?i)\\bfake-(key|token|secret|password)\\b",
    "(?i)\\bdummy-(key|token|secret|password)\\b",
  ]
