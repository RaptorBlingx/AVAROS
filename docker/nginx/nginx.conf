# AVAROS Reverse Proxy Configuration
# TLS termination + HTTP→HTTPS redirect
#
# This Nginx config terminates TLS for all external traffic to the
# AVAROS Web UI. Internal services communicate over plain HTTP within
# the Docker network. See docs/tasks/P4-L05-https-tls-termination.md.

# Resolve Docker service DNS names at request time so container
# recreations (new IPs) do not cause stale-upstream 502 errors.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (production)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # TLS hardening — only modern protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (ISO 27001 alignment)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Proxy to Web UI
    location / {
        set $web_ui_upstream http://avaros-web-ui:8080;
        proxy_pass $web_ui_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future live dashboard)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HiveMind WebSocket proxy (DEC-026: browser voice clients)
    location /hivemind {
        # Use a variable so nginx resolves avaros-hivemind via the Docker
        # DNS resolver (127.0.0.11) at request time, not just at startup.
        # Without this, container IP changes after rebuilds cause 502s.
        set $hivemind_upstream http://avaros-hivemind:5678;
        proxy_pass $hivemind_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-HiveMind-Auth $arg_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h for persistent WebSocket
        proxy_send_timeout 86400s;
    }

    # Wake-word WebSocket proxy (DEC-033: openWakeWord server-side)
    location = /wakeword/ws/detect {
        set $wakeword_upstream http://avaros-wakeword:9999;
        proxy_pass $wakeword_upstream/ws/detect;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Wake-word health proxy (optional diagnostics from browser/tools)
    location = /wakeword/health {
        set $wakeword_upstream http://avaros-wakeword:9999;
        proxy_pass $wakeword_upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Widget JS — no cache (filename has no content hash, must always be fresh)
    location = /avaros-widget.js {
        set $web_ui_upstream http://avaros-web-ui:8080;
        proxy_pass $web_ui_upstream;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Static assets caching (hashed filenames only)
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        set $web_ui_upstream http://avaros-web-ui:8080;
        proxy_pass $web_ui_upstream;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, no-transform";
    }
}
