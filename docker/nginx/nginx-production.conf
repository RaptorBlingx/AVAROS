# AVAROS Production Reverse Proxy Configuration
# Let's Encrypt TLS termination + HTTP→HTTPS redirect
#
# Usage:
#   1. Replace avaros.example.com with your actual domain
#   2. Run certbot to obtain certificates (see certbot-renew.sh)
#   3. Mount this file instead of nginx.conf in docker-compose.avaros.yml:
#        - ./nginx/nginx-production.conf:/etc/nginx/conf.d/default.conf:ro
#   4. Add certbot volume mounts to avaros-proxy service

upstream web_ui {
    server avaros-web-ui:8080;
}

upstream hivemind_ws {
    server avaros-hivemind:5678;
}

upstream wakeword_ws {
    server avaros-wakeword:9999;
}

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/avaros/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avaros/privkey.pem;

    # TLS hardening — only modern protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (ISO 27001 alignment)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Proxy to Web UI
    location / {
        proxy_pass http://web_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future live dashboard)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # HiveMind WebSocket proxy (DEC-026: browser voice clients)
    location /hivemind {
        proxy_pass http://hivemind_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h for persistent WebSocket
        proxy_send_timeout 86400s;
    }

    # Wake-word WebSocket proxy (DEC-033: openWakeWord server-side)
    location = /wakeword/ws/detect {
        proxy_pass http://wakeword_ws/ws/detect;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Wake-word health proxy (optional diagnostics from browser/tools)
    location = /wakeword/health {
        proxy_pass http://wakeword_ws/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://web_ui;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, no-transform";
    }
}
