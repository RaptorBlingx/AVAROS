# AVAROS Skill Docker Compose Configuration
#
# This compose file deploys AVAROS as a separate container that joins the
# WASABI OVOS network (per DEC-010). The skill connects to the OVOS message
# bus and uses MockAdapter by default (DEC-005: zero-config).
#
# Usage:
#   docker compose -f docker-compose.avaros.yml up -d
#   docker compose -f docker-compose.avaros.yml logs -f

services:
  avaros_db:
    container_name: avaros_db
    hostname: avaros_db
    image: postgres:15-alpine
    restart: unless-stopped

    networks:
      - ovos

    environment:
      POSTGRES_USER: avaros
      POSTGRES_PASSWORD: avaros
      POSTGRES_DB: avaros

    volumes:
      - avaros_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avaros"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  avaros_skill:
    container_name: avaros_skill
    hostname: avaros_skill
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped

    depends_on:
      avaros_db:
        condition: service_healthy

    # Join WASABI OVOS network
    networks:
      - ovos

    # Corporate DNS name doesn't always resolve inside Docker Desktop.
    # Use host-gateway by default; override RENERYO_DEPLOYS_IP when needed.
    extra_hosts:
      - "deploys.int.arti.ac:${RENERYO_DEPLOYS_IP:-host-gateway}"

    # Mount WASABI OVOS shared volumes and skill code
    volumes:
      # WASABI OVOS config (read-write for skill settings)
      - ../../wasabi-ovos/ovos/config:/home/ovos/.config/mycroft:rw

      # WASABI OVOS tmp directory (read-write)
      - ../../wasabi-ovos/ovos/tmp:/tmp/mycroft:rw

      # Mount skill code for hot-reload during development
      - ../skill:/opt/avaros/skill:ro

      # Mount locale files (intents & dialogs)
      - ../skill/locale:/opt/avaros/skill/locale:ro

      # Logs directory (persistent)
      - ./logs:/opt/avaros/logs:rw

    # Environment configuration
    environment:
      # Adapter configuration (DEC-005: MockAdapter default)
      - ADAPTER_TYPE=mock

      # OVOS messagebus endpoint (used by launch_skill.py)
      - MESSAGEBUS_HOST=${MESSAGEBUS_HOST:-ovos_messagebus}
      - MESSAGEBUS_PORT=${MESSAGEBUS_PORT:-8181}

      # Database configuration (PostgreSQL — production-grade)
      - AVAROS_DATABASE_URL=postgresql://avaros:avaros@avaros_db:5432/avaros

      # Logging configuration
      - LOG_LEVEL=INFO
      - AVAROS_LOG_LEVEL=INFO

      # OVOS configuration
      - OVOS_CONFIG_BASE_FOLDER=mycroft
      - OVOS_CONFIG_FILENAME=mycroft.conf

      # Python environment
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # Health check: verify skill is running
    healthcheck:
      test:
        ["CMD", "python", "-c", "from skill import AVAROSSkill; print('OK')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  avaros-web-ui:
    container_name: avaros-web-ui
    hostname: avaros-web-ui
    build:
      context: ..
      dockerfile: web-ui/Dockerfile
    restart: unless-stopped

    depends_on:
      avaros_db:
        condition: service_healthy

    networks:
      - ovos

    extra_hosts:
      - "deploys.int.arti.ac:${RENERYO_DEPLOYS_IP:-host-gateway}"

    # Web UI is only accessible via avaros-proxy (HTTPS)
    # For direct HTTP access in dev, use docker-compose.dev.yml override
    expose:
      - "8080"

    volumes:
      - ../skill:/opt/avaros/skill:ro

    env_file:
      - ../.env

    environment:
      - AVAROS_DATABASE_URL=postgresql://avaros:avaros@avaros_db:5432/avaros
      - AVAROS_WEB_UI_PORT=8080
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  reneryo-mock:
    container_name: reneryo-mock
    hostname: reneryo-mock
    build:
      context: ../tools/reneryo-mock
    restart: unless-stopped
    ports:
      - "${MOCK_RENERYO_PORT:-8090}:8090"
    networks:
      - ovos
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  hivemind:
    container_name: avaros-hivemind
    hostname: avaros-hivemind
    build:
      context: hivemind
      dockerfile: Dockerfile
    restart: unless-stopped

    depends_on:
      avaros_skill:
        condition: service_healthy

    networks:
      - ovos

    ports:
      - "${HIVEMIND_PORT:-5678}:5678"

    env_file:
      - ../.env

    environment:
      - HIVEMIND_MASTER_KEY=${HIVEMIND_MASTER_KEY:-avaros-dev-key-change-in-production}
      - OVOS_BUS_HOST=${OVOS_BUS_HOST:-ovos_messagebus}
      - OVOS_BUS_PORT=${OVOS_BUS_PORT:-8181}
      - HIVEMIND_WS_PORT=${HIVEMIND_WS_PORT:-5678}
      # Client credentials and allowed_types come from env_file (.env).
      # When .env is absent, entrypoint.sh applies dev defaults (DEC-005).
      - HIVEMIND_CLIENT_ALLOWED_TYPES=${HIVEMIND_CLIENT_ALLOWED_TYPES:-recognizer_loop:utterance,recognizer_loop:record_begin,recognizer_loop:record_end,recognizer_loop:audio_output_start,recognizer_loop:audio_output_end,recognizer_loop:b64_transcribe,speak,speak:b64_audio,enclosure.mouth.text,mycroft.skill.handler.start,mycroft.skill.handler.complete,mycroft.audio.service.queue,mycroft.audio.service.play,mycroft.audio.service.stop,mycroft.audio.service.pause,mycroft.audio.service.resume,ovos.common_play.SEI.get.response}

    volumes:
      - hivemind_data:/home/hivemind/.config/hivemind-core
      - hivemind_state:/home/hivemind/.local/share

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',5678)); s.close(); print('OK')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  avaros-proxy:
    container_name: avaros-proxy
    hostname: avaros-proxy
    image: nginx:1.25-alpine
    restart: unless-stopped

    depends_on:
      avaros-web-ui:
        condition: service_healthy

    networks:
      - ovos

    ports:
      - "${AVAROS_HTTPS_PORT:-443}:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--no-check-certificate",
          "-q",
          "https://127.0.0.1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

# External network created by WASABI OVOS stack
networks:
  ovos:
    external: true

volumes:
  avaros_pgdata:
    driver: local
  hivemind_data:
    driver: local
  hivemind_state:
    driver: local
  certbot_webroot:
    driver: local
