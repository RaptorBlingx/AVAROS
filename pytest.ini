[pytest]
addopts = -m "not e2e"
markers =
    integration: Integration tests against mock Reneryo server (docker required)
    real_api: Tests against real Reneryo API (credentials required via env vars)
    e2e: End-to-end tests requiring Docker services (deselect with -m "not e2e")

# E2E suites require dedicated Docker stacks and should be run explicitly:
#   ./scripts/run-e2e-tests.sh
#   ./scripts/run-voice-e2e.sh
