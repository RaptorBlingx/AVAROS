# openWakeWord training config for "Hey AVAROS" custom wake word
piper_sample_generator_path: "/home/ubuntu/piper-sample-generator"

target_phrase:
  - "hey avaros"

model_name: "hey_avaros"
output_dir: "/home/ubuntu/oww-train-data/output"

# Reduced for 6GB RAM system
n_samples: 1500
n_samples_val: 300
tts_batch_size: 16

model_type: "dnn"
layer_size: 128

rir_paths:
  - "/home/ubuntu/oww-train-data/rir"
background_paths:
  - "/home/ubuntu/oww-train-data/background"
background_paths_duplication_rate:
  - 1

augmentation_rounds: 2
augmentation_batch_size: 25

steps: 50000
max_negative_weight: 1000
target_false_positives_per_hour: 0.5
batch_n_per_class: {}

feature_data_files: {}

false_positive_validation_data_path: "/home/ubuntu/oww-train-data/fp_validation_data.npy"

custom_negative_phrases:
  - "hey alice"
  - "hey vegas"
  - "hey avis"
  - "hey alvarez"
  - "hey avatar"
  - "have a rest"
  - "hey arros"
  - "heavy arrows"
