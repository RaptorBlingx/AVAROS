# AVAROS Docker Compose - STANDALONE Mode
#
# This file runs AVAROS with its OWN bundled ovos-core.
# Use for: CI/CD, demos, or environments without WASABI.
#
# For WASABI integration (development), use instead:
#   docker compose -f docker/docker-compose.avaros.yml up -d
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f avaros # View logs
#   docker compose down           # Stop all services
#
# First run automatically uses MockAdapter (no configuration needed)

services:
  # =========================================================================
  # AVAROS Skill Service
  # =========================================================================
  avaros:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: avaros-skill
    restart: unless-stopped
    environment:
      - AVAROS_LOG_LEVEL=${AVAROS_LOG_LEVEL:-INFO}
      - AVAROS_DATA_PATH=/data
      # Platform config comes from Web UI, NOT here
    volumes:
      - avaros-data:/data
    ports:
      - "${AVAROS_PORT:-8080}:8080"
    networks:
      - avaros-network
    healthcheck:
      test: ["CMD", "python", "-c", "import skill; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.avaros.service=skill"
      - "com.avaros.description=Manufacturing KPI Voice Assistant"

  # =========================================================================
  # OVOS Core (Voice Processing)
  # =========================================================================
  ovos-core:
    image: smartgic/ovos-core:latest
    container_name: avaros-ovos-core
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ovos-config:/home/ovos/.config/mycroft
      - ./skill:/home/ovos/.local/share/mycroft/skills/avaros-skill
    networks:
      - avaros-network
    depends_on:
      - avaros
    labels:
      - "com.avaros.service=ovos-core"

  avaros-web-ui:
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    container_name: avaros-web-ui
    restart: unless-stopped
    environment:
      - AVAROS_WEB_API_KEY=${AVAROS_WEB_API_KEY:-}
      - AVAROS_DATABASE_URL=sqlite:////data/avaros.db
      - HIVEMIND_WS_URL=${HIVEMIND_WS_URL:-ws://localhost:5678}
      - HIVEMIND_CLIENT_NAME=${HIVEMIND_CLIENT_NAME:-avaros-web-client}
      - HIVEMIND_CLIENT_KEY=${HIVEMIND_CLIENT_KEY:-}
      - HIVEMIND_CLIENT_SECRET=${HIVEMIND_CLIENT_SECRET:-}
    volumes:
      - avaros-data:/data
      - ./skill:/opt/avaros/skill:ro
    ports:
      - "8080:8080"
    networks:
      - avaros-network
    depends_on:
      - avaros

  # =========================================================================
  # HiveMind-core (WebSocket Proxy for Voice — DEC-026)
  # =========================================================================
  hivemind:
    build:
      context: ./docker/hivemind
      dockerfile: Dockerfile
    container_name: avaros-hivemind
    restart: unless-stopped
    environment:
      - HIVEMIND_MASTER_KEY=${HIVEMIND_MASTER_KEY:-}
      - OVOS_BUS_HOST=avaros-ovos-core
      - OVOS_BUS_PORT=8181
      - HIVEMIND_WS_PORT=5678
      - HIVEMIND_CLIENT_NAME=${HIVEMIND_CLIENT_NAME:-avaros-web-client}
      - HIVEMIND_CLIENT_KEY=${HIVEMIND_CLIENT_KEY:-}
      - HIVEMIND_CLIENT_SECRET=${HIVEMIND_CLIENT_SECRET:-}
      - HIVEMIND_ACCESS_KEY=${HIVEMIND_ACCESS_KEY:-}
      - HIVEMIND_PASSWORD=${HIVEMIND_PASSWORD:-}
    volumes:
      - hivemind-data:/home/hivemind/.config/hivemind-core
    ports:
      - "${HIVEMIND_PORT:-5678}:5678"
    networks:
      - avaros-network
    depends_on:
      - ovos-core
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',5678)); s.close(); print('OK')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.avaros.service=hivemind"
      - "com.avaros.description=WebSocket proxy for browser voice clients"

# =========================================================================
# Networks
# =========================================================================
networks:
  avaros-network:
    driver: bridge
    name: avaros-network

# =========================================================================
# Volumes (Persistent Storage)
# =========================================================================
volumes:
  # SQLite database for settings, audit logs
  avaros-data:
    driver: local
    name: avaros-data

  # OVOS configuration
  ovos-config:
    driver: local
    name: ovos-config

  # HiveMind client database
  hivemind-data:
    driver: local
    name: hivemind-data
